name: Deploy static content to Pages

on:
  push:
    branches: ['main']

  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  supabase:
    name: Supabase — БД и Edge Functions
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Установить Supabase CLI
        uses: supabase/setup-cli@v2

      - name: Миграции и деплой Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ vars.SUPABASE_PROJECT_REF }}
        run: |
          supabase link --project-ref "$SUPABASE_PROJECT_REF"
          supabase db push
          # --no-verify-jwt: webhook Telegram без заголовка Authorization; --use-api: сборка на стороне API без Docker на раннере
          supabase functions deploy telegram-location-bot --no-verify-jwt --use-api

  deploy:
    # Не зависит от supabase: миграции БД/edge-функций и сборка статики Pages независимы —
    # идут параллельно. Итоговый wall-clock ≈ max(supabase, deploy) вместо суммы.
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    # Прокидываем URL страницы наружу, чтобы job notify мог вставить его в сообщение.
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Build
        # Только vite build (без tsc): типы уже проверены job `checks` в Test-workflow
        # на PR перед merge в main. Деплой триггерится push в main → дублировать tsc незачем.
        run: npm run build
        env:
          VITE_MAPBOX_TOKEN: ${{ vars.VITE_MAPBOX_TOKEN }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ vars.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_YANDEX_METRIKA_ID: ${{ vars.VITE_YANDEX_METRIKA_ID }}
          VITE_TELEGRAM_GEO_TTL_MINUTES: ${{ vars.VITE_TELEGRAM_GEO_TTL_MINUTES }}
          VITE_TELEGRAM_TRACK_TAIL_MINUTES: ${{ vars.VITE_TELEGRAM_TRACK_TAIL_MINUTES }}
          VITE_TELEGRAM_MAX_ACCURACY_METERS: ${{ vars.VITE_TELEGRAM_MAX_ACCURACY_METERS }}
          # В dist/404.html дублируется index.html (vite-плагин spa-fallback-404) для SPA на GitHub Pages.
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './dist'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  notify:
    name: Уведомление в Telegram
    needs: [supabase, deploy]
    # always(): джоб выполнится, даже если supabase или deploy упали или были пропущены —
    # иначе при падении в job supabase (например db push) deploy пропускается и уведомление не уходит.
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Telegram on success
        # Успех только если ОБА предыдущих джоба завершились успешно.
        if: ${{ needs.supabase.result == 'success' && needs.deploy.result == 'success' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            -d text="✅ <b>map.euc.kz</b>%0AДеплой map.euc.kz завершен успешно.%0A🔗 ${{ needs.deploy.outputs.page_url }}"
      - name: Notify Telegram on failure
        # Любой исход кроме общего успеха: падение или отмена в supabase/deploy.
        if: ${{ needs.supabase.result != 'success' || needs.deploy.result != 'success' }}
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            -d text="❌ <b>map.euc.kz</b>%0AДеплой map.euc.kz завершился ошибкой.%0ASupabase: ${{ needs.supabase.result }} · Pages: ${{ needs.deploy.result }}%0A🧾 Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
