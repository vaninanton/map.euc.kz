name: Test

on:
  # На PR гоняем всегда (merge-гейт). На push в main — пропускаем, если изменения
  # затронули только не-кодовые файлы (docs/markdown/конфиги редактора): тесты на
  # этот код уже прошли на PR, повторный прогон на main был бы дублем.
  pull_request:
  push:
    branches: ['main']
    paths-ignore:
      - '**/*.md'
      - 'LICENSE'
      - '.editorconfig'
      - '.gitignore'
      - '.vscode/**'

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Быстрые проверки: lint + формат + типы + unit-тесты. Без Playwright/браузера.
  checks:
    name: Lint, types, unit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Unit tests
        run: npm test

  # E2E (Playwright) на статической preview-сборке — идёт параллельно с checks.
  e2e:
    name: E2E
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

  # Уведомление в Telegram при падении любого из job. Отдельным job, чтобы не дублировать.
  notify:
    name: Notify on failure
    runs-on: ubuntu-latest
    needs: [checks, e2e]
    if: failure()
    steps:
      - name: Notify Telegram
        # На PR из форков секреты недоступны — токен будет пуст, запрос просто не пройдёт, шаг не валит сборку.
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            -d text="❌ <b>map.euc.kz</b>%0AАвтотесты map.euc.kz упали (${{ github.ref_name }}).%0A🧾 Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
