name: Test

on:
  pull_request:
  push:
    branches: ['main']

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Type check
        run: npx tsc -b --noEmit

      - name: Unit tests
        run: npm test

      - name: E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore

      - name: Build
        run: npm run build
        env:
          VITE_MAPBOX_TOKEN: e2e-mapbox-token
          VITE_SUPABASE_URL: https://e2e.supabase.co
          VITE_SUPABASE_PUBLISHABLE_KEY: e2e-publishable-key
          VITE_TELEGRAM_GEO_TTL_MINUTES: '60'
          VITE_TELEGRAM_TRACK_TAIL_MINUTES: '30'
          VITE_TELEGRAM_MAX_ACCURACY_METERS: '100'

      - name: Notify Telegram on failure
        # Только при падении (lint/тесты/сборка). Успешные прогоны не уведомляем.
        # На PR из форков секреты недоступны — токен будет пуст, запрос просто не пройдёт, шаг не валит сборку.
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            -d parse_mode="HTML" \
            -d disable_web_page_preview="true" \
            -d text="❌ <b>map.euc.kz</b>%0AАвтотесты map.euc.kz упали (${{ github.ref_name }}).%0A🧾 Run: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
